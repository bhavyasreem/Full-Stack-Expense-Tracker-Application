<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage your monthly budgets.">
    <title>Expense Tracker - Budgets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar" id="main-nav">
        <a href="index.html" class="nav-brand">
            <span>💲</span>ExpenseTracker
        </a>
        <ul class="nav-links" id="nav-links">
            <!-- Nav links generated by script.js -->
        </ul>
        <div class="nav-user" id="nav-user-container"></div>
    </nav>

    <main class="container">
        <h1 style="margin-bottom: 2rem;">Budget Planning</h1>

        <div class="grid-2">
            <!-- Add/Edit Budget Form -->
            <div class="card">
                <h3 id="budget-form-title">Add/Set Budget</h3>
                <p id="budget-form-desc">Define financial projections for a month</p>
                <form id="budget-form">
                    <input type="hidden" id="budget-edit-id" value="">
                    
                    <div class="form-group">
                        <label for="bud-month">Target Month</label>
                        <select id="bud-month" class="form-control" required>
                            <option value="" disabled selected>Select Month</option>
                            <option value="January 2026">January 2026</option>
                            <option value="February 2026">February 2026</option>
                            <option value="March 2026">March 2026</option>
                            <option value="April 2026">April 2026</option>
                            <option value="May 2026">May 2026</option>
                            <option value="June 2026">June 2026</option>
                            <option value="July 2026">July 2026</option>
                            <option value="August 2026">August 2026</option>
                            <option value="September 2026">September 2026</option>
                            <option value="October 2026">October 2026</option>
                            <option value="November 2026">November 2026</option>
                            <option value="December 2026">December 2026</option>
                        </select>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <button type="button" id="budget-autofill-btn" class="btn btn-secondary" style="font-size: 0.85rem; padding: 0.5rem 1rem; width: 100%;">
                            ⚡ Auto-Fill details from actual logs
                        </button>
                    </div>

                    <div class="form-group">
                        <label for="bud-income">Total Income (₹)</label>
                        <input type="number" id="bud-income" class="form-control" required placeholder="e.g. 60000">
                    </div>
                    <div class="form-group">
                        <label for="bud-expense">Total Expense (₹)</label>
                        <input type="number" id="bud-expense" class="form-control" required placeholder="e.g. 35000">
                    </div>
                    <div class="form-group">
                        <label for="bud-savings">Projected Savings (₹)</label>
                        <input type="number" id="bud-savings" class="form-control" required placeholder="Auto-calculated (Income - Expense)">
                    </div>
                    <div class="form-group">
                        <label for="bud-status">Budget Status</label>
                        <select id="bud-status" class="form-control" required>
                            <option value="Under Budget">Under Budget</option>
                            <option value="Over Budget">Over Budget</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="bud-id">Custom Budget ID (Optional)</label>
                        <input type="number" id="bud-id" class="form-control" placeholder="Leave empty for auto-generation">
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <button type="submit" id="budget-btn" class="btn btn-primary" style="flex: 1;">Save Budget</button>
                        <button type="button" id="budget-cancel-btn" class="btn btn-secondary" style="display: none;">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- View Budget Log -->
            <div class="card" style="display: flex; flex-direction: column;">
                <h3>Budgets Log</h3>
                <p>Saved monthly financial projections</p>
                <div class="table-responsive" style="flex: 1;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Month</th>
                                <th>Income</th>
                                <th>Expense</th>
                                <th>Savings</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="budgets-list">
                            <tr>
                                <td colspan="7" style="text-align: center; color: var(--text-muted);">Loading budgets...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer style="margin-top: auto; padding: 2rem; border-top: 1px solid var(--border-color); text-align: center; color: var(--text-muted); font-size: 0.85rem;">
        &copy; 2026 ExpenseTracker Application. All rights reserved.
    </footer>

    <div class="notification-container" id="notification-container"></div>
    <script src="script.js"></script>
</body>
</html>

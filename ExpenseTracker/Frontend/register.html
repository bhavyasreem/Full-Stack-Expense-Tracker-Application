<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for a new Expense Tracker account.">
    <title>Expense Tracker - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar" id="main-nav">
        <a href="index.html" class="nav-brand">
            <span>💲</span>ExpenseTracker
        </a>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
        <div class="nav-user" id="nav-user-container"></div>
    </nav>

    <main class="container">
        <div class="auth-container card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Sign up to start tracking your finances</p>
            </div>
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" class="form-control" required placeholder="e.g. Rahul Sharma">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" class="form-control" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="reg-phone">Phone Number</label>
                    <input type="tel" id="reg-phone" class="form-control" required placeholder="e.g. 9876543210">
                </div>
                <div class="form-group">
                    <label for="reg-city">City</label>
                    <input type="text" id="reg-city" class="form-control" required placeholder="e.g. Hyderabad">
                </div>
                <div class="form-group">
                    <label for="reg-userid">User ID (Optional, numeric)</label>
                    <input type="number" id="reg-userid" class="form-control" placeholder="Leave empty for auto-generation (e.g. 101)">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="login.html">Log In here</a>
            </div>
        </div>
    </main>

    <footer style="margin-top: auto; padding: 2rem; border-top: 1px solid var(--border-color); text-align: center; color: var(--text-muted); font-size: 0.85rem;">
        &copy; 2026 ExpenseTracker Application. All rights reserved.
    </footer>

    <div class="notification-container" id="notification-container"></div>
    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your Expense Tracker account to manage your budgets.">
    <title>Expense Tracker - Log In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar" id="main-nav">
        <a href="index.html" class="nav-brand">
            <span>💲</span>ExpenseTracker
        </a>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
        </ul>
        <div class="nav-user" id="nav-user-container"></div>
    </nav>

    <main class="container">
        <div class="auth-container card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Enter your details to access your dashboard</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" class="form-control" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" class="form-control" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>
            </form>
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </main>

    <footer style="margin-top: auto; padding: 2rem; border-top: 1px solid var(--border-color); text-align: center; color: var(--text-muted); font-size: 0.85rem;">
        &copy; 2026 ExpenseTracker Application. All rights reserved.
    </footer>

    <div class="notification-container" id="notification-container"></div>
    <script src="script.js"></script>
</body>
</html>

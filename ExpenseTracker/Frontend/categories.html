<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage your expense categories and limits.">
    <title>Expense Tracker - Categories</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar" id="main-nav">
        <a href="index.html" class="nav-brand">
            <span>💲</span>ExpenseTracker
        </a>
        <ul class="nav-links" id="nav-links">
            <!-- Nav links generated by script.js -->
        </ul>
        <div class="nav-user" id="nav-user-container"></div>
    </nav>

    <main class="container">
        <h1 style="margin-bottom: 2rem;">Category Management</h1>

        <div class="grid-2">
            <!-- Add/Edit Category Form -->
            <div class="card">
                <h3 id="category-form-title">Add Category</h3>
                <p id="category-form-desc">Create a new container for tagging expenses</p>
                <form id="category-form">
                    <!-- Stores ID when editing -->
                    <input type="hidden" id="category-edit-id" value="">
                    
                    <div class="form-group">
                        <label for="cat-name">Category Name</label>
                        <input type="text" id="cat-name" class="form-control" required placeholder="e.g. Shopping, Rent">
                    </div>
                    <div class="form-group">
                        <label for="cat-limit">Monthly Limit (₹)</label>
                        <input type="number" id="cat-limit" class="form-control" required min="1" placeholder="e.g. 10000">
                    </div>
                    <div class="form-group">
                        <label for="cat-description">Description</label>
                        <textarea id="cat-description" class="form-control" rows="3" placeholder="e.g. Travel tickets, cab fares, and fuel"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="cat-id">Custom Category ID (Optional)</label>
                        <input type="number" id="cat-id" class="form-control" placeholder="Leave empty for auto-generation">
                    </div>
                    
                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <button type="submit" id="category-btn" class="btn btn-primary" style="flex: 1;">Save Category</button>
                        <button type="button" id="category-cancel-btn" class="btn btn-secondary" style="display: none;">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- View Categories -->
            <div class="card" style="display: flex; flex-direction: column;">
                <h3>Active Categories</h3>
                <p>Configured cost limits and descriptions</p>
                <div class="table-responsive" style="flex: 1;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Category Name</th>
                                <th>Monthly Limit</th>
                                <th>Description</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="categories-list">
                            <tr>
                                <td colspan="5" style="text-align: center; color: var(--text-muted);">Loading category settings...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer style="margin-top: auto; padding: 2rem; border-top: 1px solid var(--border-color); text-align: center; color: var(--text-muted); font-size: 0.85rem;">
        &copy; 2026 ExpenseTracker Application. All rights reserved.
    </footer>

    <div class="notification-container" id="notification-container"></div>
    <script src="script.js"></script>
</body>
</html>

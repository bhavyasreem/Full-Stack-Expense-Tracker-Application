<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage your income transactions.">
    <title>Expense Tracker - Income</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar" id="main-nav">
        <a href="index.html" class="nav-brand">
            <span>💲</span>ExpenseTracker
        </a>
        <ul class="nav-links" id="nav-links">
            <!-- Nav links generated by script.js -->
        </ul>
        <div class="nav-user" id="nav-user-container"></div>
    </nav>

    <main class="container">
        <h1 style="margin-bottom: 2rem;">Income Management</h1>

        <div class="grid-2">
            <!-- Add/Edit Income Form -->
            <div class="card">
                <h3 id="income-form-title">Add Income</h3>
                <p id="income-form-desc">Record a new source of revenue</p>
                <form id="income-form">
                    <!-- Stores ID when editing -->
                    <input type="hidden" id="income-edit-id" value="">
                    
                    <div class="form-group">
                        <label for="inc-source">Source</label>
                        <input type="text" id="inc-source" class="form-control" required placeholder="e.g. Salary, Freelance">
                    </div>
                    <div class="form-group">
                        <label for="inc-amount">Amount (₹)</label>
                        <input type="number" id="inc-amount" class="form-control" required min="1" placeholder="e.g. 50000">
                    </div>
                    <div class="form-group">
                        <label for="inc-date">Date Received</label>
                        <input type="date" id="inc-date" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="inc-description">Description</label>
                        <textarea id="inc-description" class="form-control" rows="3" placeholder="e.g. Monthly salary payout"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="inc-id">Custom Income ID (Optional)</label>
                        <input type="number" id="inc-id" class="form-control" placeholder="Leave empty for auto-generation">
                    </div>
                    
                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <button type="submit" id="income-btn" class="btn btn-success" style="flex: 1;">Save Income</button>
                        <button type="button" id="income-cancel-btn" class="btn btn-secondary" style="display: none;">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- View Income History -->
            <div class="card" style="display: flex; flex-direction: column;">
                <h3>Income History</h3>
                <p>Track your past cash flows</p>
                <div class="table-responsive" style="flex: 1;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Source</th>
                                <th>Amount</th>
                                <th>Date</th>
                                <th>Description</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="income-list">
                            <tr>
                                <td colspan="6" style="text-align: center; color: var(--text-muted);">Loading income logs...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer style="margin-top: auto; padding: 2rem; border-top: 1px solid var(--border-color); text-align: center; color: var(--text-muted); font-size: 0.85rem;">
        &copy; 2026 ExpenseTracker Application. All rights reserved.
    </footer>

    <div class="notification-container" id="notification-container"></div>
    <script src="script.js"></script>
</body>
</html>
